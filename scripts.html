<script>
    // FIXED: Add escapeHtml function to prevent XSS
    function escapeHtml(text) {
        if (!text) return "";
        const div = document.createElement('div');
        div.textContent = String(text);
        return div.innerHTML;
    }

    // === Client-side IST Timezone Formatter ===
    function formatDateToIST(dateInput) {
        if (!dateInput) return "";
        
        try {
            const date = new Date(dateInput);
            if (isNaN(date.getTime())) return "Unknown date";
            
            // Use toLocaleString with Asia/Kolkata timezone
            const options = {
                year: 'numeric',
                month: 'short',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                hour12: true,
                timeZone: 'Asia/Kolkata'
            };
            
            return date.toLocaleString('en-US', options) + ' IST';
        } catch (e) {
            console.error("Error formatting date to IST:", e);
            return "Unknown date";
        }
    }

    // === PERFORMANCE: Simple cache for static data only (users, settings, role) ===
    // Project/action data is NOT cached - always fetched fresh to avoid stale data issues
    const SESSION_CACHE = {
        staticData: null,
        timestamp: null,
        TTL_MS: 300000, // 5 minutes for static data (rarely changes)
        
        set: function(data) {
            // Only cache static data that rarely changes
            this.staticData = {
                email: data.email,
                role: data.role,
                users: data.users,
                settings: data.settings
            };
            this.timestamp = Date.now();
            console.log('✓ Cached static data (users, settings, role)');
        },
        
        get: function() {
            if (this.staticData && this.timestamp && (Date.now() - this.timestamp < this.TTL_MS)) {
                console.log('✓ Using cached static data (age: ' + Math.round((Date.now() - this.timestamp) / 1000) + 's)');
                return this.staticData;
            }
            return null;
        },
        
        invalidate: function() {
            this.staticData = null;
            this.timestamp = null;
            console.log('✗ Static cache cleared');
        }
    };
    
    // Helper: Clear ALL caches (static + tab data)
    function clearAllCaches() {
        console.log('🔄 Clearing all caches (static + tab data)');
        SESSION_CACHE.invalidate();
        tabState.tabData = {};
    }
    
    // === PERFORMANCE: Debounce utility for filter operations ===
    function debounce(func, wait) {
        let timeout;
        return function executedFunction(...args) {
            const later = () => {
                clearTimeout(timeout);
                func(...args);
            };
            clearTimeout(timeout);
            timeout = setTimeout(later, wait);
        };
    }

    // === STATUS GROUPING HELPERS ===
    // Maps individual statuses to their display groups for UI
    const STATUS_TO_GROUP = {
        "Not Started": "Ongoing",
        "In Progress": "Ongoing",
        "Pending": "Ongoing",
        "On Hold": "On Hold",
        "Completed": "Completed & Closure",
        "Closure": "Completed & Closure",
        "Cancelled": "Cancelled"
    };

    // Get the displayed group status name for a raw status
    function getDisplayStatus(rawStatus) {
        return STATUS_TO_GROUP[rawStatus] || rawStatus;
    }

    // State
    let appState = {
        email: "",
        role: "",
        projects: [],
        actions: [],
        currentProjectId: null,  // Track which project is being viewed in detail modal
        settings: { projectTypes: [], phases: [], statuses: [] },
        metrics: {}
    };

    // === TAB STATE: Manage status tabs and lazy loading ===
    let tabState = {
        currentStatus: "All",
        statusTabs: [], // Will be populated from settings
        tabData: {}, // Cache for each status tab: { "All": { projects: [], actions: [], currentPage: 1 }, "In Progress": {...} }
        itemsPerPage: 50
    };
    
    // === VIEW MODE STATE ===
    let viewState = {
        currentMode: "List",  // "Card" or "List", default to List
        expandedProjects: {},  // Cache for expanded project details { projectId: { project, actions } }
    };

    function setGlobalLoading(isLoading, text = "Refreshing content...") {
        const wrap = document.getElementById("globalLoading");
        const label = document.getElementById("globalLoadingText");
        if (!wrap) return;
        if (label) label.textContent = text;
        if (isLoading) {
            wrap.classList.remove("d-none");
            wrap.classList.add("d-flex");
        } else {
            wrap.classList.add("d-none");
            wrap.classList.remove("d-flex");
        }
    }

    function syncModalBackdrops() {
        const openModals = Array.from(document.querySelectorAll('.modal.show'));

        // hard reset all existing backdrops first
        document.querySelectorAll('.modal-backdrop').forEach(bp => bp.remove());

        if (openModals.length === 0) {
            document.body.classList.remove('modal-open');
            document.body.style.removeProperty('padding-right');
            return;
        }

        // restore modal-open when at least one modal is active
        document.body.classList.add('modal-open');

        // identify top-most visible modal by z-index
        let topModal = openModals[0];
        let topZ = parseInt(window.getComputedStyle(topModal).zIndex, 10) || 1050;
        openModals.forEach(m => {
            const z = parseInt(window.getComputedStyle(m).zIndex, 10) || 1050;
            if (z > topZ) {
                topZ = z;
                topModal = m;
            }
        });

        // create one clean backdrop beneath the top-most modal
        const newBackdrop = document.createElement('div');
        newBackdrop.className = 'modal-backdrop fade show';
        newBackdrop.style.setProperty('z-index', String(topZ - 1), 'important');
        document.body.appendChild(newBackdrop);
    }

    // Initialization
    document.addEventListener("DOMContentLoaded", () => {
        loadDashboard();

        // Form Listeners
        document.getElementById("projectForm").addEventListener("submit", handleProjectSubmit);
        document.getElementById("actionForm").addEventListener("submit", handleActionSubmit);
        document.getElementById("updateActionForm").addEventListener("submit", handleUpdateSubmit);
        document.getElementById("projectCommentForm").addEventListener("submit", handleProjectCommentSubmit);
        
        // Add edit project form listener
        const editForm = document.getElementById("editProjectForm");
        if (editForm) {
            editForm.addEventListener("submit", handleEditProjectSubmit);
        }

        // Admin Form Listeners
        document.getElementById("addUserForm").addEventListener("submit", handleSaveUser);
        document.getElementById("addSettingForm").addEventListener("submit", handleSaveSetting);

        // Wire up project -> assigned owner auto-refresh in action modal
        const projSelect = document.getElementById("aProjectSelect");
        if (projSelect) {
            projSelect.addEventListener('change', () => updateAssignedTo());
        }

        // When the action modal is shown, refresh assigned owner display
        const actionModalEl = document.getElementById('actionModal');
        if (actionModalEl) {
            actionModalEl.addEventListener('show.bs.modal', () => updateAssignedTo());
        }
        // reset the new project form whenever the modal opens so stale values are cleared
        const projectModalEl = document.getElementById('projectModal');
        if (projectModalEl) {
            projectModalEl.addEventListener('show.bs.modal', () => {
                const form = document.getElementById('projectForm');
                if (form) form.reset();
            });
        }

        // ensure backdrop z-index is just below the opening modal (fix stacking for nested modals)
        const modalIds = [
            'projectDetailModal','projectModal','editProjectModal',
            'actionModal','projectCommentModal','historyModal','updateActionModal'
        ];
        modalIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.addEventListener('show.bs.modal', () => {
                    // small delay to let bootstrap create the backdrop element
                    setTimeout(() => {
                        const backdrop = document.querySelector('.modal-backdrop');
                        if (backdrop) {
                            const z = parseInt(window.getComputedStyle(el).zIndex, 10) || 1050;
                            // use setProperty to add !important so it beats the base rule
                            backdrop.style.setProperty('z-index', (z - 1), 'important');
                        }
                    }, 0);
                });
            }
        });

        // always reset backdrop stack whenever any modal closes
        document.addEventListener('hidden.bs.modal', () => {
            setTimeout(() => {
                syncModalBackdrops();
            }, 0);
        });
    });

    // --- API Calls ---
    // loadDashboard optionally accepts a callback that's executed after the state is updated
    function loadDashboard(callback, forceRefresh = false) {
        console.log("🔄 Starting loadDashboard() [forceRefresh=" + forceRefresh + "]...");
        
        // If force refresh, clear all caches first
        if (forceRefresh) {
            clearAllCaches();
        }
        
        // === PERFORMANCE: Check static data cache only (users, settings, role) ===
        const cachedStatic = SESSION_CACHE.get();
        if (cachedStatic && !forceRefresh) {
            console.log("✓ Using cached static data, will load tab data fresh");
            appState = {
                email: cachedStatic.email || "",
                role: cachedStatic.role || "",
                settings: cachedStatic.settings || { projectTypes: [], phases: [], statuses: [] },
                projects: [],
                actions: [],
                metrics: {}
            };
            window.allUsers = cachedStatic.users || [];
            
            populateDropdowns();
            renderHeader();
            applyRBAC();
            initializeTabs();
            
            if (callback && typeof callback === 'function') {
                callback();
            }
            return; // Skip server call
        }
        
        setGlobalLoading(true, "Refreshing dashboard...");
        google.script.run
            .withSuccessHandler(data => {
                console.log("2. SuccessHandler: Data received! Size:", data ? Object.keys(data).length : 0);
                
                if (!data) {
                    showAlert("No data returned from server", "danger");
                    setGlobalLoading(false);
                    return;
                }
                
                // === PERFORMANCE: Cache only static data ===
                SESSION_CACHE.set(data);
                
                appState = {
                    email: data.email || "",
                    role: data.role || "",
                    settings: data.settings || { projectTypes: [], phases: [], statuses: [] },
                    projects: [],
                    actions: [],
                    metrics: data.metrics || {}
                };
                
                // Set initial view mode from user preference
                viewState.currentMode = data.viewPreference || "List";
                
                // Update view toggle buttons to reflect current mode
                const btnCard = document.getElementById("btnCardView");
                const btnList = document.getElementById("btnListView");
                if (viewState.currentMode === "Card") {
                    btnCard.classList.add("active");
                    btnList.classList.remove("active");
                } else {
                    btnList.classList.add("active");
                    btnCard.classList.remove("active");
                }

                // Store users globally for assignee dropdown
                window.allUsers = data.users || [];

                console.log("3. Populating Dropdowns...");
                populateDropdowns();

                console.log("4. Rendering Header...");
                renderHeader();

                console.log("5. Initializing Tabs...");
                initializeTabs();

                console.log("6. Applying RBAC...");
                applyRBAC();

                console.log("7. Dashboard load successfully finished.");
                if (callback && typeof callback === 'function') {
                    callback();
                }
                setGlobalLoading(false);
            })
            .withFailureHandler(err => {
                console.error("Dashboard load failed:", err);
                document.getElementById("projectsGrid").innerHTML = `<div class='col-12 text-center text-danger py-5'>Failed to load data. Please refresh.</div>`;
                showAlert("Error loading dashboard: " + err.message, "danger");
                setGlobalLoading(false);
            })
                .getDashboardData();
    }

    // === TAB-BASED LAZY LOADING SYSTEM ===
    
    /**
     * Initialize status tabs from settings
     */
    function initializeTabs() {
        if (!appState.settings || !appState.settings.statuses) return;
        
        // Create grouped status tabs from the raw statuses
        // Each tab represents a display group (e.g., "Ongoing", "On Hold", "Completed & Closure", "Cancelled")
        const groupedStatuses = new Set();
        
        appState.settings.statuses.forEach(rawStatus => {
            // Map each raw status to its display group
            const displayStatus = getDisplayStatus(rawStatus);
            groupedStatuses.add(displayStatus);
        });
        
        // Convert to sorted array for consistent ordering
        tabState.statusTabs = Array.from(groupedStatuses).sort((a, b) => {
            // Custom sort: "Ongoing" first, then "On Hold", then "Completed & Closure", then "Cancelled"
            const order = ["Ongoing", "On Hold", "Completed & Closure", "Cancelled"];
            const indexA = order.indexOf(a);
            const indexB = order.indexOf(b);
            // If status not in order array, put at end
            if (indexA === -1 && indexB === -1) return 0;
            if (indexA === -1) return 1;
            if (indexB === -1) return -1;
            return indexA - indexB;
        });
        
        renderTabs();
        
        // Load first status tab by default (should be "Ongoing")
        if (tabState.statusTabs.length > 0) {
            switchTab(tabState.statusTabs[0]);
        }
    }
    
    /**
     * Render tab navigation
     */
    function renderTabs() {
        const tabsContainer = document.getElementById("statusTabs");
        if (!tabsContainer) return;
        
        let html = '';
        tabState.statusTabs.forEach((status, index) => {
            const isActive = status === tabState.currentStatus ? 'active' : '';
            const statusClass = getStatusClass(status);
            const tabId = `tab-${status.replace(/\s+/g, '-')}`;
            
            // Get count from cached tab data if available
            const tabData = tabState.tabData[status];
            const count = tabData ? tabData.projects.length : 0;
            const label = count > 0 ? `${status} - ${count}` : status;
            
            html += `
                <li class="nav-item" role="presentation">
                    <button class="nav-link ${isActive}" id="${tabId}" 
                            data-bs-toggle="tab" 
                            data-status="${escapeHtml(status)}"
                            type="button" 
                            role="tab"
                            onclick="switchTab('${escapeHtml(status)}')">
                        <span class="badge ${statusClass}">${escapeHtml(label)}</span>
                    </button>
                </li>
            `;
        });
        
        tabsContainer.innerHTML = html;
    }
    
    /**
     * Update the project count badge for a specific tab
     */
    function updateTabCount(status) {
        const tabId = `tab-${status.replace(/\s+/g, '-')}`;
        const tabButton = document.getElementById(tabId);
        if (!tabButton) return;
        
        const tabData = tabState.tabData[status];
        const count = tabData ? tabData.projects.length : 0;
        const label = count > 0 ? `${status} - ${count}` : status;
        
        // Update the status badge text with new label
        const statusBadge = tabButton.querySelector('.badge');
        if (statusBadge) {
            statusBadge.textContent = label;
        }
    }
    
    /**
     * Switch to a different status tab and load its data
     */
    function switchTab(status) {
        console.log("Switching to tab:", status);
        tabState.currentStatus = status;
        
        // Update UI
        document.querySelectorAll('#statusTabs .nav-link').forEach(tab => {
            tab.classList.remove('active');
        });
        const tabId = `tab-${status.replace(/\s+/g, '-')}`;
        const activeTab = document.getElementById(tabId);
        if (activeTab) {
            activeTab.classList.add('active');
        }
        
        // Check if this tab's data is already loaded
        if (tabState.tabData[status]) {
            console.log("Using cached tab data for:", status);
            renderTabContent(status);
        } else {
            // Load data for this tab
            loadTabData(status);
        }
    }
    
    /**
     * Load projects and actions for a specific status tab
     * @param {string} status - Status to load
     * @param {boolean} forceRefresh - If true, clears cache before loading
     */
    function loadTabData(status, forceRefresh = false) {
        console.log(`🔄 Loading tab: ${status} [forceRefresh=${forceRefresh}]`);
        
        // If force refresh, clear this tab's cache
        if (forceRefresh && tabState.tabData[status]) {
            delete tabState.tabData[status];
            console.log(`✗ Cleared cache for ${status} tab`);
        }
        
        setGlobalLoading(true, `Loading ${status === "All" ? "all" : status} projects...`);
        
        const tabContent = document.getElementById("statusTabContent");
        if (tabContent) {
            tabContent.innerHTML = `
                <div class="col-12 text-center text-muted py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <div class="mt-2">Loading ${status === "All" ? "all" : status} projects...</div>
                </div>
            `;
        }
        
        google.script.run
            .withSuccessHandler(data => {
                console.log(`✓ Received ${data.projects.length} projects for ${status} tab`);
                
                // Cache the tab data
                tabState.tabData[status] = {
                    projects: data.projects || [],
                    actions: data.actions || [],
                    currentPage: 1
                };
                
                // Update tab count badge
                updateTabCount(status);
                
                renderTabContent(status);
                setGlobalLoading(false);
            })
            .withFailureHandler(err => {
                console.error("Failed to load tab data:", err);
                const tabContent = document.getElementById("statusTabContent");
                if (tabContent) {
                    tabContent.innerHTML = `
                        <div class='col-12 text-center text-danger py-5'>
                            Failed to load projects. 
                            <button class="btn btn-primary btn-sm mt-2" onclick="loadTabData('${status}', true)">Retry</button>
                        </div>
                    `;
                }
                setGlobalLoading(false);
                showAlert("Error loading projects: " + err.message, "danger");
            })
            .getProjectsByStatus(status);
    }
    
    /**
     * Render the content for the current tab
     */
    function renderTabContent(status) {
        const tabContent = document.getElementById("statusTabContent");
        if (!tabContent) {
            console.error("statusTabContent element not found");
            return;
        }
        
        const tabData = tabState.tabData[status];
        if (!tabData) {
            tabContent.innerHTML = '<div class="col-12 text-center text-muted py-5">No data available</div>';
            return;
        }
        
        // Apply filters to the projects
        const filteredProjects = applyFiltersToProjects(tabData.projects);
        tabData.filteredProjects = filteredProjects;
        
        console.log(`Rendering ${filteredProjects.length} filtered projects for ${status}`);
        
        // Populate project dropdown for action assignment
        populateProjectDropdown();
        
        if (filteredProjects.length === 0) {
            tabContent.innerHTML = '<div class="col-12 text-center text-muted py-5">No projects found matching filters</div>';
            document.getElementById("paginationControls")?.classList.add("d-none");
            return;
        }
        
        // Render page
        renderTabPage(status, tabData.currentPage, filteredProjects);
    }
    
    /**
     * Render a specific page within a tab
     */
    function renderTabPage(status, pageNum, filteredProjects) {
        const tabContent = document.getElementById("statusTabContent");
        if (!tabContent) return;
        
        const itemsPerPage = tabState.itemsPerPage;
        const totalPages = Math.ceil(filteredProjects.length / itemsPerPage);
        const startIdx = (pageNum - 1) * itemsPerPage;
        const endIdx = Math.min(startIdx + itemsPerPage, filteredProjects.length);
        const pageProjects = filteredProjects.slice(startIdx, endIdx);
        
        console.log(`Rendering page ${pageNum} of ${totalPages} (${pageProjects.length} projects) in ${viewState.currentMode} view`);
        
        // Use DocumentFragment for efficient rendering
        const fragment = document.createDocumentFragment();
        const tempDiv = document.createElement('div');
        
        if (viewState.currentMode === "Card") {
            // Card view - Bootstrap grid
            tempDiv.className = 'row';
            pageProjects.forEach(project => {
                const col = document.createElement('div');
                col.className = 'col-md-6 col-lg-4 mb-4';
                col.innerHTML = generateProjectCard(project);
                tempDiv.appendChild(col);
            });
        } else {
            // List view - Full width rows
            tempDiv.className = 'project-list';
            pageProjects.forEach(project => {
                const row = document.createElement('div');
                row.innerHTML = generateProjectListRow(project);
                tempDiv.appendChild(row);
            });
        }
        
        fragment.appendChild(tempDiv);
        tabContent.innerHTML = '';
        tabContent.appendChild(fragment);
        
        // Update pagination controls
        updatePaginationControls(pageNum, totalPages, filteredProjects.length);
        
        // Smooth scroll to top
        tabContent.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
    
    /**
     * Update pagination controls visibility and state
     */
    function updatePaginationControls(currentPage, totalPages, totalItems) {
        const controls = document.getElementById("paginationControls");
        const pageInfo = document.getElementById("pageInfo");
        const btnFirst = document.getElementById("btnFirstPage");
        const btnPrev = document.getElementById("btnPrevPage");
        const btnNext = document.getElementById("btnNextPage");
        const btnLast = document.getElementById("btnLastPage");
        
        if (!controls) return;
        
        if (totalPages <= 1) {
            controls.classList.add("d-none");
            return;
        }
        
        controls.classList.remove("d-none");
        
        if (pageInfo) {
            pageInfo.textContent = `Page ${currentPage} of ${totalPages} (${totalItems} projects)`;
        }
        
        if (btnFirst) btnFirst.disabled = currentPage === 1;
        if (btnPrev) btnPrev.disabled = currentPage === 1;
        if (btnNext) btnNext.disabled = currentPage === totalPages;
        if (btnLast) btnLast.disabled = currentPage === totalPages;
    }
    
    /**
     * Change page within current tab
     */
    function changeTabPage(direction) {
        const status = tabState.currentStatus;
        const tabData = tabState.tabData[status];
        if (!tabData || !tabData.filteredProjects) return;
        
        const totalPages = Math.ceil(tabData.filteredProjects.length / tabState.itemsPerPage);
        let newPage = tabData.currentPage;
        
        switch (direction) {
            case 'first':
                newPage = 1;
                break;
            case 'prev':
                newPage = Math.max(1, tabData.currentPage - 1);
                break;
            case 'next':
                newPage = Math.min(totalPages, tabData.currentPage + 1);
                break;
            case 'last':
                newPage = totalPages;
                break;
        }
        
        if (newPage !== tabData.currentPage) {
            tabData.currentPage = newPage;
            renderTabPage(status, newPage, tabData.filteredProjects);
        }
    }
    
    /**
     * Refresh the current tab only
     */
    function refreshCurrentTab() {
        const status = tabState.currentStatus;
        console.log("🔄 Manual refresh: Current tab (", status, ")");
        
        // Force refresh (clears cache)
        loadTabData(status, true);
        
        showAlert("Tab refreshed", "info");
    }
    
    /**
     * Refresh all tabs and clear all caches
     */
    function refreshAll() {
        console.log("🔄 Manual refresh: All data");
        
        // Clear all caches
        clearAllCaches();
        
        // Reload settings and tabs
        setGlobalLoading(true, "Clearing cache and reloading...");
        
        google.script.run
            .withSuccessHandler(data => {
                if (!data) {
                    showAlert("No data returned from server", "danger");
                    setGlobalLoading(false);
                    return;
                }
                
                // Update app state with fresh settings
                appState = {
                    email: data.email || "",
                    role: data.role || "",
                    projects: [],
                    actions: [],
                    settings: data.settings || { projectTypes: [], phases: [], statuses: [] },
                    metrics: data.metrics || {},
                    currentProjectId: appState.currentProjectId
                };
                
                window.allUsers = data.users || [];
                
                populateDropdowns();
                renderHeader();
                applyRBAC();
                
                // Re-initialize tabs
                initializeTabs();
                
                setGlobalLoading(false);
                showAlert("All data refreshed successfully", "success");
            })
            .withFailureHandler(err => {
                console.error("Failed to refresh all:", err);
                setGlobalLoading(false);
                showAlert("Error refreshing data: " + err.message, "danger");
            })
            .getDashboardData();
    }
    
    /**
     * Refresh a single project's data
     */
    function refreshProject(projectId) {
        console.log("🔄 Manual refresh: Single project", projectId);
        
        // Clear cache for current tab to ensure fresh data
        const status = tabState.currentStatus;
        if (tabState.tabData[status]) {
            delete tabState.tabData[status];
            console.log(`✗ Cleared ${status} tab cache before refresh`);
        }
        
        setGlobalLoading(true, "Refreshing project...");
        
        google.script.run
            .withSuccessHandler(details => {
                setGlobalLoading(false);
                
                if (!details) {
                    showAlert("Failed to refresh project", "danger");
                    return;
                }
                
                // Update the project in current tab data
                const status = tabState.currentStatus;
                const tabData = tabState.tabData[status];
                
                if (tabData && tabData.projects) {
                    const index = tabData.projects.findIndex(p => p.id === projectId);
                    if (index !== -1) {
                        // Merge updated data
                        tabData.projects[index] = { 
                            ...tabData.projects[index], 
                            ...details,
                            commentCount: details.comments ? details.comments.length : 0,
                            lastComment: details.comments && details.comments.length > 0 ? 
                                details.comments[details.comments.length - 1] : null
                        };
                        
                        // Re-render current tab
                        renderTabContent(status);
                        showAlert("Project refreshed", "success");
                    } else {
                        // Project not in current tab, reload entire dashboard
                        console.warn("Project not found in current tab, reloading dashboard");
                        clearAllCaches();
                        loadDashboard(null, true);
                    }
                } else {
                    // Tab not available, reload entire dashboard
                    console.warn("Tab data not available, reloading dashboard");
                    clearAllCaches();
                    loadDashboard(null, true);
                }
            })
            .withFailureHandler(err => {
                setGlobalLoading(false);
                showAlert("Error refreshing project: " + err.message, "danger");
            })
            .getProjectDetails(projectId);
    }
    
    /**
     * Apply filters to a list of projects
     */
    function applyFiltersToProjects(projects) {
        const phase = document.getElementById("filterPhase")?.value || "All";
        const owner = document.getElementById("filterOwner")?.value || "All";
        const dateFrom = document.getElementById("filterDateFrom")?.value || "";
        const dateTo = document.getElementById("filterDateTo")?.value || "";
        
        console.log("Applying filters - phase:", phase, "owner:", owner, "dateFrom:", dateFrom, "dateTo:", dateTo, "projects:", projects.length);
        
        const filtered = projects.filter(project => {
            // Phase filter
            if (phase !== "All" && project.phase !== phase) {
                console.log(`Project ${project.id} filtered out: phase mismatch`);
                return false;
            }
            
            // Owner filter
            if (owner !== "All" && project.owner !== owner) {
                console.log(`Project ${project.id} filtered out: owner mismatch`);
                return false;
            }
            
            // Date range filter - safely compare ISO date strings
            if (dateFrom || dateTo) {
                let projectDateStr = "";
                if (project.lastUpdatedDate) {
                    try {
                        // Parse the localized date string and convert to ISO date (YYYY-MM-DD)
                        const d = new Date(project.lastUpdatedDate);
                        if (!isNaN(d.getTime())) {
                            projectDateStr = d.toISOString().split('T')[0];
                        }
                    } catch (e) {
                        console.warn("Could not parse date:", project.lastUpdatedDate);
                    }
                }
                
                // If we can't determine project date and filter is active, exclude it
                if (!projectDateStr && (dateFrom || dateTo)) {
                    console.log(`Project ${project.id} filtered out: no valid date`);
                    return false;
                }
                
                // String comparison works fine for ISO dates (YYYY-MM-DD format)
                if (dateFrom && projectDateStr < dateFrom) {
                    console.log(`Project ${project.id} filtered out: before dateFrom`);
                    return false;
                }
                if (dateTo && projectDateStr > dateTo) {
                    console.log(`Project ${project.id} filtered out: after dateTo`);
                    return false;
                }
            }
            
            return true;
        });
        
        console.log(`Filtered from ${projects.length} to ${filtered.length} projects`);
        return filtered;
    }

    /**
     * Toggle expansion of a project in list view
     */
    function toggleProjectExpand(projectId) {
        const expandIcon = document.getElementById(`expandIcon-${projectId}`);
        const expandContent = document.getElementById(`expandContent-${projectId}`);
        
        if (!expandContent) return;
        
        const isCurrentlyExpanded = expandContent.classList.contains('show');
        
        if (isCurrentlyExpanded) {
            // Collapse
            expandContent.classList.remove('show');
            if (expandIcon) expandIcon.textContent = '▶';
        } else {
            // Expand
            expandContent.classList.add('show');
            if (expandIcon) expandIcon.textContent = '▼';
            
            // Use already loaded data from tabState (no server call!)
            if (!viewState.expandedProjects[projectId]) {
                const currentTabData = tabState.tabData[tabState.currentStatus];
                if (currentTabData) {
                    // Find project in already-loaded data
                    const project = currentTabData.projects.find(p => p.id === projectId);
                    const projectActions = currentTabData.actions.filter(a => a.projectId === projectId);
                    
                    if (project) {
                        // Build details object from already-loaded data
                        const details = {
                            project: project,
                            actions: projectActions,
                        };
                        
                        // Render immediately with available data
                        viewState.expandedProjects[projectId] = details;
                        expandContent.innerHTML = generateExpandedContent(details);
                        
                        // Load full comments history in background (only if needed)
                        if (project.commentCount > 1) {
                            loadProjectComments(projectId, expandContent);
                        }
                    } else {
                        expandContent.innerHTML = '<div class="p-3 text-danger">Project not found in current tab data</div>';
                    }
                } else {
                    expandContent.innerHTML = '<div class="p-3 text-danger">Tab data not loaded</div>';
                }
            }
        }
    }
    
    /**
     * Load full comment history for a project (background fetch)
     */
    function loadProjectComments(projectId, expandContent) {
        google.script.run
            .withSuccessHandler(function(details) {
                if (details && details.project && details.project.comments) {
                    // Update cached data with full comment history
                    if (viewState.expandedProjects[projectId]) {
                        viewState.expandedProjects[projectId].project.comments = details.project.comments;
                        
                        // Re-render if still expanded
                        if (expandContent.classList.contains('show')) {
                            expandContent.innerHTML = generateExpandedContent(viewState.expandedProjects[projectId]);
                        }
                    }
                }
            })
            .withFailureHandler(function(err) {
                console.error('Failed to load comments:', err);
            })
            .getProjectDetails(projectId);
    }
    
    /**
     * Refresh expanded project details
     */
    function refreshExpandedProject(projectId) {
        const expandContent = document.getElementById(`expandContent-${projectId}`);
        if (!expandContent) return;
        
        // Only refresh if currently expanded
        if (!expandContent.classList.contains('show')) {
            console.log(`Project ${projectId} not expanded, skipping refresh`);
            return;
        }
        
        // Show spinner
        expandContent.innerHTML = '<div class="p-3 text-center"><span class="spinner-border spinner-border-sm" role="status"></span> Refreshing...</div>';
        
        google.script.run
            .withSuccessHandler(function(details) {
                viewState.expandedProjects[projectId] = details;
                if (expandContent.classList.contains('show')) {
                    expandContent.innerHTML = generateExpandedContent(details);

            })
            .withFailureHandler(function(err) {
                if (expandContent.classList.contains('show')) {
                    expandContent.innerHTML = `<div class="p-3 text-danger">Error: ${escapeHtml(err.message)}</div>`;
                }
            })
            .getProjectDetails(projectId);

    /**
     * Populate project dropdown for action assignment from all loaded tabs
     */
    function populateProjectDropdown() {
        const select = document.getElementById("aProjectSelect");
        if (!select) return;
        
        select.innerHTML = '<option value="">Select Project...</option>';
        
        // Collect all projects from all loaded tabs
        const allProjects = [];
        for (const status in tabState.tabData) {
            const tabData = tabState.tabData[status];
            if (tabData && tabData.projects) {
                allProjects.push(...tabData.projects);
            }
        }
        
        // Remove duplicates by ID
        const uniqueProjects = [];
        const seenIds = new Set();
        for (const project of allProjects) {
            if (!seenIds.has(project.id)) {
                seenIds.add(project.id);
                uniqueProjects.push(project);
            }
        }
        
        // Sort by name
        uniqueProjects.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
        
        // Populate dropdown
        uniqueProjects.forEach(p => {
            select.innerHTML += `<option value="${p.id}">${escapeHtml(p.name)} (${p.id})</option>`;
        });
    }

    /**
     * Populate owner multi-select filter (Admin/Manager only)
     */
    function populateOwnerFilterMultiple() {
        const ownerSelect = document.getElementById('filterOwner');
        if (!ownerSelect) return;
        
        // Get unique owners from all loaded projects across all tabs
        const allProjects = [];
        for (const status in tabState.tabData) {
            const tabData = tabState.tabData[status];
            if (tabData && tabData.projects) {
                allProjects.push(...tabData.projects);
            }
        }
        
        const owners = [...new Set(allProjects.map(p => p.owner).filter(o => o))];
        owners.sort((a, b) => a.localeCompare(b));
        
        // Try to resolve to friendly names
        const options = owners.map(o => {
            const user = (window.allUsers || []).find(u => u.email === o);
            const display = user && user.name ? `${user.name}` : o;
            return `<option value="${o}">${escapeHtml(display)}</option>`;
        });
        
        ownerSelect.innerHTML = options.join('');
    }

    // Build list of unique project owners for the dashboard filter (LEGACY - kept for compatibility)
    function populateOwnerFilter() {
        const ownerSelect = document.getElementById('filterOwner');
        if (!ownerSelect) return;

        const previous = ownerSelect.value;
        // Assemble unique owner emails from projects the user can see
        const owners = [...new Set(appState.projects.map(p => p.owner).filter(o => o))];
        owners.sort((a, b) => a.localeCompare(b));

        // Try to resolve to friendly names using the global users list
        const options = owners.map(o => {
            const user = (window.allUsers || []).find(u => u.email === o);
            const display = user && user.name ? `${user.name} (${o})` : o;
            return `<option value="${o}">${escapeHtml(display)}</option>`;
        });

        ownerSelect.innerHTML = `<option value="All">All Owners</option>` + options.join('');
        if (previous && owners.includes(previous)) {
            ownerSelect.value = previous;
        } else {
            ownerSelect.value = "All";
        }
    }

        // Get all users from appState
        let users = [];

        if (window.allUsers && window.allUsers.length > 0) {

        if (searchInput) {
            searchInput.addEventListener("input", filterAssignees);

        const toggleBtn = document.getElementById("aAssigneeDropdown");
        if (toggleBtn) {

        document.addEventListener("click", (e) => {

        const assignedEmail = document.getElementById('aAssignedToEmail');
        if (!select || !assignedDisplay || !assignedEmail) return;

        if (!projId) {
            assignedDisplay.textContent = 'Not selected';
            assignedEmail.value = '';

        const proj = findProjectById(projId);
        if (!proj) {

        if (phaseEl) phaseEl.textContent = proj.phase || '-';

        const proj = findProjectById(projectId) || {};
        const projPhase = proj.phase || '';

        let html = "";
        if (projPhase) {
            html += `<div class="mb-2"><small class="text-muted">Project Phase:</small> <strong>${escapeHtml(projPhase)}</strong></div>`;
        }

    // --- Filter Handlers ---
    // === PERFORMANCE: Cache parsed dates to avoid repeated parsing ===
    let filterCache = {
        dateFrom: null,
        dateTo: null,
        parsedDateFrom: null,
        parsedDateTo: null
    };
    
    function passesFilters(item) {
        const statusFilter = document.getElementById("filterStatus").value;
        const phaseFilter = document.getElementById("filterPhase").value;
        const ownerFilterEl = document.getElementById("filterOwner");
        const ownerFilter = ownerFilterEl ? ownerFilterEl.value : "All";
        const dateFrom = document.getElementById("filterDateFrom").value;
        const dateTo = document.getElementById("filterDateTo").value;

        // 1. Status Filter
        if (statusFilter !== "All" && item.status !== statusFilter) return false;

        // 1.b Phase Filter
        if (phaseFilter !== "All" && item.phase !== phaseFilter) return false;

        // 1c. Owner Filter (only applies if user selected one)
        if (ownerFilter && ownerFilter !== "All" && item.owner !== ownerFilter) return false;

        // 2. Date Filter - === PERFORMANCE: Cache parsed dates ===
        if (dateFrom || dateTo) {
            // Cache date parsing
            if (filterCache.dateFrom !== dateFrom) {
                filterCache.dateFrom = dateFrom;
                filterCache.parsedDateFrom = dateFrom ? new Date(dateFrom).setHours(0, 0, 0, 0) : null;
            }
            if (filterCache.dateTo !== dateTo) {
                filterCache.dateTo = dateTo;
                filterCache.parsedDateTo = dateTo ? new Date(dateTo).setHours(23, 59, 59, 999) : null;
            }
            
            const itemDate = new Date(item.lastUpdatedDate).getTime();
            if (filterCache.parsedDateFrom && itemDate < filterCache.parsedDateFrom) return false;
            if (filterCache.parsedDateTo && itemDate > filterCache.parsedDateTo) return false;
        }

        return true;
    }

    // --- Utils ---
    function getStatusColor(status) {
        // Handle both raw statuses and grouped statuses
        // Raw statuses: "Not Started", "In Progress", "Pending", "On Hold", "Completed", "Cancelled", "Closure"
        // Grouped statuses: "Ongoing", "On Hold", "Completed & Closure", "Cancelled"
        
        if (status === "Ongoing") return "primary"; // blue for ongoing items
        if (status === "Not Started") return "secondary"; // grey
        if (status === "In Progress") return "info"; // blue
        if (status === "Pending") return "warning"; // yellow
        if (status === "On Hold") return "danger"; // red
        if (status === "Completed & Closure" || status === "Completed" || status === "Closure") return "success"; // green
        if (status === "Cancelled") return "dark"; // dark for cancelled
        return "secondary"; // fallback
    }

    function getStatusBadge(status) {
        if (status === "Completed" || status === "Closure") return "badge bg-success";
        if (status === "On Hold" || status === "Cancelled") return "badge bg-danger";
        if (status === "In Progress") return "badge bg-info text-dark";
        if (status === "Pending") return "badge bg-warning text-dark";
        return "badge bg-secondary";
    }

    function getProgressBarColor(percentage) {
        // Color bar based on completion percentage
        if (percentage >= 66) return "success"; // green: 66-100%
        if (percentage >= 33) return "warning"; // yellow: 33-65%
        return "danger"; // red: 0-32%
    }

        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Saving...`;
        setGlobalLoading(true, "Updating action...");

        const actionId = document.getElementById("uActionId").value;
        const newStatus = document.getElementById("uStatus").value;
        const pct = document.getElementById("uPct").value;
        const note = document.getElementById("uNote").value;

        google.script.run
            .withSuccessHandler(res => {
                bootstrap.Modal.getOrCreateInstance(document.getElementById('updateActionModal')).hide();
                btn.disabled = false;
                btn.innerHTML = "Save Update";

                showAlert("Action saved!", "success");
                
                // === PERFORMANCE: Differential update instead of full reload ===
                if (res && res.success && res.action) {
                    // Update action in tab data
                    let updated = false;
                    let projectId = null;
                    
                    for (const status in tabState.tabData) {
                        if (tabState.tabData[status] && tabState.tabData[status].actions) {
                            const actionIndex = tabState.tabData[status].actions.findIndex(a => a.id === actionId);
                            if (actionIndex !== -1) {
                                tabState.tabData[status].actions[actionIndex] = { ...tabState.tabData[status].actions[actionIndex], ...res.action };
                                
                                // Find the project ID for this action
                                if (tabState.tabData[status].projects) {
                                    const actionObj = tabState.tabData[status].actions[actionIndex];
                                    projectId = actionObj.projectId;
                                }
                                
                                updated = true;
                                break;
                            }
                        }
                    }
                    
                    // Update cache
                    SESSION_CACHE.updateItem('actions', actionId, res.action);
                    
                    // Clear expanded cache for this project to force reload with fresh data
                    if (projectId) {
                        clearExpandedProjectCache(projectId);
                        autoRefreshExpandedProjects(projectId);
                    }
                    
                    // Re-render current tab
                    if (updated) {
                        renderTabContent(tabState.currentStatus);
                    }
                    setGlobalLoading(false);
                } else {
                    // Fallback to full reload if server doesn't return differential data
                    refreshCurrentTab();
                    setGlobalLoading(false);
                }
            })
            .withFailureHandler(err => {
                showAlert(err.message, "danger");
                btn.disabled = false;
                btn.innerHTML = "Save Update";
                setGlobalLoading(false);
            })
            .updateActionStatus(actionId, newStatus, pct, note);

    /**

        // Search through all loaded tab data
        for (const status in tabState.tabData) {
            const tabData = tabState.tabData[status];
            if (tabData && tabData.projects) {
                const project = tabData.projects.find(p => p.id === projectId);
                if (project) {
                    return project;
                }
            }
        }
        return null;
    }

    // Helper: Get all actions from loaded tabs for a specific project
    function getActionsForProject(projectId) {
        const allActions = [];
        for (const status in tabState.tabData) {
            if (tabState.tabData[status] && tabState.tabData[status].actions) {
                const projectActions = tabState.tabData[status].actions.filter(a => a.projectId === projectId);
                allActions.push(...projectActions);
            }
        }
        return allActions;
    }

    // Helper: Find an action by ID across all loaded tabs
    function findActionById(actionId) {
        for (const status in tabState.tabData) {
            if (tabState.tabData[status] && tabState.tabData[status].actions) {
                const action = tabState.tabData[status].actions.find(a => a.id === actionId);
                if (action) return action;
            }
        }
        return null;
    }

    function handleEditProjectSubmit(e) {
        e.preventDefault();
        const btn = document.getElementById("btnSaveProjectEdit");
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Saving...`;
        setGlobalLoading(true, "Updating project...");

        const projectId = document.getElementById("editProjectId").value;
        let type = null;
        const typeEl = document.getElementById("editProjectType");
        if (typeEl) {
            type = typeEl.value;
            if (type === "") type = null;
        }
        const status = document.getElementById("editProjectStatus").value;
        const phase = document.getElementById("editProjectPhase").value;
        const percentage = parseInt(document.getElementById("editProjectPercentage").value) || 0;
        const startDate = document.getElementById("editProjectStart").value || null;
        const deadline = document.getElementById("editProjectDeadline").value || null;
        const note = document.getElementById("editProjectNote").value.trim();

        console.log("Updating project:", {projectId, status, phase, percentage, startDate, deadline, note, type});

        // validation
        if (!status) {
            showAlert("Status is required", "danger");
            btn.disabled = false;
            btn.innerHTML = "Save Changes";
            return;
        }
        if (!phase) {
            showAlert("Phase is required", "danger");
            btn.disabled = false;
            btn.innerHTML = "Save Changes";
            return;
        }

        google.script.run
            .withSuccessHandler(res => {
                console.log("Update response:", res);
                bootstrap.Modal.getOrCreateInstance(document.getElementById('editProjectModal')).hide();
                btn.disabled = false;
                btn.innerHTML = "Save Changes";

                showAlert("Project updated successfully!", "success");
                
                // === OPTIMIZATION: Only refresh affected tabs, not the entire dashboard ===
                const projectId = document.getElementById("editProjectId").value;
                const project = findProjectById(projectId);
                const newStatus = document.getElementById("editProjectStatus").value;
                
                const oldDisplayStatus = project ? getDisplayStatus(project.status) : null;
                const newDisplayStatus = getDisplayStatus(newStatus);
                
                // Collect tabs to refresh
                const tabsToRefresh = new Set();
                if (oldDisplayStatus) {
                    tabsToRefresh.add(oldDisplayStatus);
                    console.log(`Marking old status tab for refresh: ${oldDisplayStatus}`);
                }
                tabsToRefresh.add(newDisplayStatus);
                console.log(`Marking new status tab for refresh: ${newDisplayStatus}`);
                
                // Clear cache only for affected tabs
                tabsToRefresh.forEach(tabStatus => {
                    if (tabState.tabData[tabStatus]) {
                        delete tabState.tabData[tabStatus];
                        console.log(`✗ Cleared cache for ${tabStatus} tab`);
                    }
                });
                
                // Refresh affected tabs - reload sequentially
                let refreshIndex = 0;
                const tabsToRefreshArray = Array.from(tabsToRefresh);
                
                function refreshNextTab() {
                    if (refreshIndex < tabsToRefreshArray.length) {
                        const tab = tabsToRefreshArray[refreshIndex++];
                        loadTabData(tab, true);
                    } else {
                        // Refresh expanded view if this project is currently expanded
                        const projectId = document.getElementById("editProjectId").value;
                        clearExpandedProjectCache(projectId);
                        autoRefreshExpandedProjects(projectId);
                        
                        // After all tabs are refreshed, switch to the new status tab
                        switchTab(newDisplayStatus);
                        setGlobalLoading(false);
                    }
                }
                
                if (tabsToRefreshArray.length > 0) {
                    refreshNextTab();
                } else {
                    setGlobalLoading(false);
                }
            })
            .withFailureHandler(err => {
                console.error("Update error:", err);
                showAlert("Error: " + err.message, "danger");
                btn.disabled = false;
                btn.innerHTML = "Save Changes";
                setGlobalLoading(false);
            })
            .updateProject(projectId, status, phase, percentage, note, startDate, deadline, type);
    }

    function toggleMetrics() {
        const metricsDiv = document.getElementById("rollupMetrics");
        const btn = document.getElementById("metricsToggleBtn");
        const icon = document.getElementById("metricsToggleIcon");
        const text = document.getElementById("metricsToggleText");
        
        if (metricsDiv.classList.contains("collapsed")) {
            // === PERFORMANCE: Load metrics on-demand when expanding ===
            if (!appState.metrics || !appState.metrics.loaded) {
                // Metrics not loaded yet, fetch them
                btn.disabled = true;
                icon.textContent = "⏳";
                if (text) text.textContent = "Loading...";
                
                google.script.run
                    .withSuccessHandler(metrics => {
                        appState.metrics = metrics;
                        renderMetrics();
                        
                        // Now expand
                        metricsDiv.classList.remove("collapsed");
                        icon.textContent = "▼";
                        if (text) text.textContent = "Collapse";
                        btn.disabled = false;
                    })
                    .withFailureHandler(err => {
                        showAlert("Failed to load metrics: " + err.message, "danger");
                        icon.textContent = "▶";
                        if (text) text.textContent = "Expand";
                        btn.disabled = false;
                    })
                    .getMetrics();
            } else {
                // Metrics already loaded, just expand
                metricsDiv.classList.remove("collapsed");
                icon.textContent = "▼";
                if (text) text.textContent = "Collapse";
            }
        } else {
            // collapse
            metricsDiv.classList.add("collapsed");
            icon.textContent = "▶";
            if (text) text.textContent = "Expand";
        }
    }
    
    /**
     * Render metrics in the dashboard
     */
    function renderMetrics() {
        if (!appState.metrics || !appState.metrics.loaded) return;
        
        const metrics = appState.metrics;
        
        document.getElementById("metricActive").textContent = metrics.totalActive || 0;
        document.getElementById("metricAvg").textContent = metrics.averageCompletion || 0;
        document.getElementById("metricBlocked").textContent = metrics.blockedActions || 0;
        document.getElementById("metricTotal").textContent = metrics.totalProjects || 0;
        document.getElementById("metricCompleted").textContent = metrics.completedProjects || 0;
        document.getElementById("metricCompletionRate").textContent = metrics.completionRate || 0;
        document.getElementById("metricActions").textContent = metrics.totalActions || 0;
        document.getElementById("metricCompletedActions").textContent = metrics.completedActions || 0;
        document.getElementById("metricOnTime").textContent = metrics.onTimeActions || 0;
        document.getElementById("metricHighPriority").textContent = metrics.highPriorityActions || 0;
        document.getElementById("onTrackProjects").textContent = metrics.onTrackCount || 0;
        document.getElementById("atRiskProjects").textContent = metrics.atRiskCount || 0;

        // Status breakdown
        let statusHtml = "";
        for (const [status, count] of Object.entries(metrics.statusCounts || {})) {
            statusHtml += `<div class="d-flex justify-content-between mb-1"><span class="text-muted">${escapeHtml(status)}</span><span class="fw-bold">${count}</span></div>`;
        }
        document.getElementById("metricStatuses").innerHTML = statusHtml || "No projects.";
        
        // Phase breakdown
        let phaseHtml = "";
        for (const [phase, avg] of Object.entries(metrics.phaseCompletion || {})) {
            phaseHtml += `<div class="d-flex justify-content-between mb-1"><span class="text-muted">${escapeHtml(phase)}</span><span class="fw-bold">${avg}%</span></div>`;
        }
        document.getElementById("metricPhaseBreakdown").innerHTML = phaseHtml || "No data.";
    }

    function getLatestProjectUpdate(project) {
        // Try to get the latest comment/update first
        if (project.comments && project.comments.length > 0) {
            const latest = project.comments[project.comments.length - 1];
            return latest.text || project.lastUpdatedText || "No updates yet.";
        }
        return project.lastUpdatedText || "No updates yet.";
    }

    function showAlert(message, type) {
        const modalEl = document.getElementById("notificationModal");
        const titleEl = document.getElementById("notificationModalTitle");
        const bodyEl = document.getElementById("notificationModalBody");
        const headerEl = document.getElementById("notificationModalHeader");
        const contentEl = document.getElementById("notificationModalContent");

        if (!modalEl || !titleEl || !bodyEl || !headerEl || !contentEl) {
            const container = document.getElementById("alertContainer");
            if (container) {
                container.classList.remove("d-none");
                container.innerHTML = `<div class="alert alert-${type} shadow-sm" role="alert">${escapeHtml(String(message || ""))}</div>`;
            }
            return;
        }

        const normalizedType = ["success", "danger", "warning", "info", "primary", "secondary"].includes(type) ? type : "info";
        const titleMap = {
            success: "Success",
            danger: "Error",
            warning: "Warning",
            info: "Information",
            primary: "Notice",
            secondary: "Notice"
        };

        titleEl.textContent = titleMap[normalizedType] || "Information";
        bodyEl.textContent = String(message || "");

        headerEl.className = `modal-header bg-${normalizedType} ${normalizedType === "warning" || normalizedType === "info" ? "text-dark" : "text-white"}`;
        contentEl.style.borderLeftColor = normalizedType === "danger" ? "#dc3545" : normalizedType === "success" ? "#198754" : normalizedType === "warning" ? "#ffc107" : normalizedType === "info" ? "#0dcaf0" : "#0d6efd";

        const modal = bootstrap.Modal.getOrCreateInstance(modalEl, {
            backdrop: false,
            keyboard: true,
            focus: true
        });

        modal.show();

        const autoHideDelay = normalizedType === "danger" ? 6500 : 3500;
        clearTimeout(showAlert._timer);
        showAlert._timer = setTimeout(() => {
            try {
                if (modalEl.classList.contains("show")) {
                    modal.hide();
                }
            } catch (e) {
                // ignore modal hide errors
            }
        }, autoHideDelay);
    }

    function toggleAdminPanel() {
        const isHidden = document.getElementById("adminPanel").classList.contains("d-none");
        const statusTabsCard = document.getElementById("statusTabsCard"); // get the status tabs container card

        if (isHidden) {
            document.getElementById("adminPanel").classList.remove("d-none");
            if (statusTabsCard) statusTabsCard.classList.add("d-none");
            document.getElementById("mainActions").classList.add("d-none");
            document.getElementById("mainHeading").innerText = "Admin Console";
            document.getElementById("btnAdminPanel").innerText = "Exit Admin";
            document.getElementById("btnAdminPanel").classList.replace("btn-outline-light", "btn-warning");
            loadAdminData();
        } else {
            document.getElementById("adminPanel").classList.add("d-none");
            if (statusTabsCard) statusTabsCard.classList.remove("d-none");
            document.getElementById("mainActions").classList.remove("d-none");
            document.getElementById("mainHeading").innerText = "Dashboard";
            document.getElementById("btnAdminPanel").innerText = "Admin Panel";
            document.getElementById("btnAdminPanel").classList.replace("btn-warning", "btn-outline-light");
            clearAllCaches();
            loadDashboard(null, true); // Refresh state from any settings changes
        }
    }

    function loadAdminData() {
        document.getElementById("adminUsersTableBody").innerHTML = "<tr><td colspan='5' class='text-center'>Loading...</td></tr>";
        google.script.run
            .withSuccessHandler(renderAdminData)
            .withFailureHandler(err => showAlert(err.message, "danger"))
            .getAdminData();
        
        // Also load system stats
        refreshAdminStats();
    }

    function renderAdminData(data) {
        // Render users
        const uBody = document.getElementById("adminUsersTableBody");
        uBody.innerHTML = "";
        data.users.forEach(u => {
            uBody.innerHTML += `
               <tr>
                 <td>${escapeHtml(u.email)}</td>
                 <td>${escapeHtml(u.name)}</td>
                 <td><span class="badge bg-secondary">${escapeHtml(u.role)}</span></td>
                 <td>${escapeHtml(u.manager || "-")}</td>
                 <td>${u.emailEnabled ? '<span class="text-success fw-bold">✓ Yes</span>' : '<span class="text-muted">✗ No</span>'}</td>
                 <td>
                   <button class="btn btn-sm btn-outline-primary py-0 me-1 btn-edit-user"
                           data-email="${escapeHtml(u.email)}"
                           data-name="${escapeHtml(u.name)}"
                           data-role="${escapeHtml(u.role)}"
                           data-manager="${escapeHtml(u.manager || '')}"
                           data-emailenabled="${u.emailEnabled}">Edit</button>
                   <button class="btn btn-sm btn-outline-danger py-0 btn-delete-user" data-email="${escapeHtml(u.email)}">Drop</button>
                 </td>
               </tr>
            `;
        });

        // Update admin counters
        const userCountEl = document.getElementById('adminUserCount');
        const settingCountEl = document.getElementById('adminSettingCount');
        if (userCountEl) userCountEl.textContent = `${data.users.length} Users`;
        if (settingCountEl) settingCountEl.textContent = `${data.settingsList.length} Settings`;

        // Render settings grouped
        const sGrid = document.getElementById("adminSettingsGrid");
        sGrid.innerHTML = "";

        const groupedSettings = data.settingsList.reduce((acc, curr) => {
            if (!acc[curr.key]) acc[curr.key] = [];
            acc[curr.key].push(curr.value);
            return acc;
        }, {});

        for (const [key, values] of Object.entries(groupedSettings)) {
            let rowHtml = "";
            values.forEach(v => {
                rowHtml += `
                 <li class="list-group-item d-flex justify-content-between align-items-center py-1">
                   <small>${escapeHtml(v)}</small>
                   <button class="btn btn-sm btn-link text-danger p-0 btn-delete-setting" data-key="${escapeHtml(key)}" data-value="${escapeHtml(v)}">&times;</button>
                 </li>
                `;
            });

            sGrid.innerHTML += `
              <div class="col-md-4 mb-3">
                 <div class="card h-100">
                    <div class="card-header fw-bold bg-light py-2">${escapeHtml(key)}</div>
                    <ul class="list-group list-group-flush">${rowHtml}</ul>
                 </div>
              </div>
            `;
        }

        // Wire setting delete buttons
        document.querySelectorAll('.btn-delete-setting').forEach(btn => {
            btn.addEventListener('click', function() {
                const key = this.getAttribute('data-key');
                const val = this.getAttribute('data-value');
                if (!confirm(`Remove '${val}' from ${key}?`)) return;
                google.script.run
                    .withSuccessHandler(res => { showAlert(res, "success"); loadAdminData(); })
                    .withFailureHandler(err => showAlert(err.message, "danger"))
                    .deleteSetting(key, val);
            });
        });

        // Wire user delete buttons
        document.querySelectorAll('.btn-delete-user').forEach(btn => {
            btn.addEventListener('click', function() {
                const email = this.getAttribute('data-email');
                if (!confirm(`Are you sure you want to remove ${email}?`)) return;
                google.script.run
                    .withSuccessHandler(res => { showAlert(res, "success"); loadAdminData(); })
                    .withFailureHandler(err => showAlert(err.message, "danger"))
                    .deleteUser(email);
            });
        });

        // Wire user edit buttons
        document.querySelectorAll('.btn-edit-user').forEach(btn => {
            btn.addEventListener('click', function() {
                const email = this.getAttribute('data-email');
                const name = this.getAttribute('data-name');
                const role = this.getAttribute('data-role');
                const manager = this.getAttribute('data-manager');
                const emailEnabled = this.getAttribute('data-emailenabled') === 'true';

                document.getElementById('auEmail').value = email;
                document.getElementById('auName').value = name;
                document.getElementById('auRole').value = role;
                document.getElementById('auManager').value = manager;
                document.getElementById('auEmailEnabled').checked = emailEnabled;

                document.getElementById('auEmail').readOnly = true;
                document.getElementById('auEmail').classList.add('bg-light');

                document.getElementById('btnSaveUser').textContent = 'Update';
                document.getElementById('btnSaveUser').classList.remove('btn-primary');
                document.getElementById('btnSaveUser').classList.add('btn-warning');

                const cancelBtn = document.getElementById('btnCancelUser');
                if (cancelBtn) cancelBtn.classList.remove('d-none');

                document.getElementById('addUserForm').scrollIntoView({ behavior: 'smooth', block: 'center' });
            });
        });
    }

        const name = document.getElementById("auName").value;
        const role = document.getElementById("auRole").value;

    function filterUsersTable() {
        const searchInput = document.getElementById('userSearchInput');
        if (!searchInput) return;

        const filter = searchInput.value.toLowerCase();
        const tbody = document.getElementById('adminUsersTableBody');
        if (!tbody) return;

        const rows = tbody.getElementsByTagName('tr');
        let visibleCount = 0;

        for (let i = 0; i < rows.length; i++) {
            const row = rows[i];
            const cells = row.getElementsByTagName('td');
            let found = false;

            for (let j = 0; j < Math.min(4, cells.length); j++) {
                const cellText = cells[j].textContent || cells[j].innerText;
                if (cellText.toLowerCase().indexOf(filter) > -1) {
                    found = true;
                    break;
                }
            }

            if (found || filter === '') {
                row.style.display = '';
                visibleCount++;
            } else {
                row.style.display = 'none';
            }
        }

        const userCountEl = document.getElementById('adminUserCount');
        if (userCountEl) {
            userCountEl.textContent = `${visibleCount} Users${filter ? ' (filtered)' : ''}`;
        }
    }

            .deleteSetting(key, val);
