<script>
    // FIXED: Add escapeHtml function to prevent XSS
    function escapeHtml(text) {
        if (!text) return "";
        const div = document.createElement('div');
        div.textContent = String(text);
        return div.innerHTML;
    }

    // State
    let appState = {
        email: "",
        role: "",
        projects: [],
        actions: [],
        currentProjectId: null  // Track which project is being viewed in detail modal
    };

    function setGlobalLoading(isLoading, text = "Refreshing content...") {
        const wrap = document.getElementById("globalLoading");
        const label = document.getElementById("globalLoadingText");
        if (!wrap) return;
        if (label) label.textContent = text;
        if (isLoading) {
            wrap.classList.remove("d-none");
            wrap.classList.add("d-flex");
        } else {
            wrap.classList.add("d-none");
            wrap.classList.remove("d-flex");
        }
    }

    function syncModalBackdrops() {
        const openModals = Array.from(document.querySelectorAll('.modal.show'));

        // hard reset all existing backdrops first
        document.querySelectorAll('.modal-backdrop').forEach(bp => bp.remove());

        if (openModals.length === 0) {
            document.body.classList.remove('modal-open');
            document.body.style.removeProperty('padding-right');
            return;
        }

        // restore modal-open when at least one modal is active
        document.body.classList.add('modal-open');

        // identify top-most visible modal by z-index
        let topModal = openModals[0];
        let topZ = parseInt(window.getComputedStyle(topModal).zIndex, 10) || 1050;
        openModals.forEach(m => {
            const z = parseInt(window.getComputedStyle(m).zIndex, 10) || 1050;
            if (z > topZ) {
                topZ = z;
                topModal = m;
            }
        });

        // create one clean backdrop beneath the top-most modal
        const newBackdrop = document.createElement('div');
        newBackdrop.className = 'modal-backdrop fade show';
        newBackdrop.style.setProperty('z-index', String(topZ - 1), 'important');
        document.body.appendChild(newBackdrop);
    }

    // Initialization
    document.addEventListener("DOMContentLoaded", () => {
        loadDashboard();

        // Form Listeners
        document.getElementById("projectForm").addEventListener("submit", handleProjectSubmit);
        document.getElementById("actionForm").addEventListener("submit", handleActionSubmit);
        document.getElementById("updateActionForm").addEventListener("submit", handleUpdateSubmit);
        document.getElementById("projectCommentForm").addEventListener("submit", handleProjectCommentSubmit);
        
        // Add edit project form listener
        const editForm = document.getElementById("editProjectForm");
        if (editForm) {
            editForm.addEventListener("submit", handleEditProjectSubmit);
        }

        // Admin Form Listeners
        document.getElementById("addUserForm").addEventListener("submit", handleSaveUser);
        document.getElementById("addSettingForm").addEventListener("submit", handleSaveSetting);

        // Wire up project -> assigned owner auto-refresh in action modal
        const projSelect = document.getElementById("aProjectSelect");
        if (projSelect) {
            projSelect.addEventListener('change', () => updateAssignedTo());
        }

        // When the action modal is shown, refresh assigned owner display
        const actionModalEl = document.getElementById('actionModal');
        if (actionModalEl) {
            actionModalEl.addEventListener('show.bs.modal', () => updateAssignedTo());
        }
        // reset the new project form whenever the modal opens so stale values are cleared
        const projectModalEl = document.getElementById('projectModal');
        if (projectModalEl) {
            projectModalEl.addEventListener('show.bs.modal', () => {
                const form = document.getElementById('projectForm');
                if (form) form.reset();
            });
        }

        // ensure backdrop z-index is just below the opening modal (fix stacking for nested modals)
        const modalIds = [
            'projectDetailModal','projectModal','editProjectModal',
            'actionModal','projectCommentModal','historyModal','updateActionModal'
        ];
        modalIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.addEventListener('show.bs.modal', () => {
                    // small delay to let bootstrap create the backdrop element
                    setTimeout(() => {
                        const backdrop = document.querySelector('.modal-backdrop');
                        if (backdrop) {
                            const z = parseInt(window.getComputedStyle(el).zIndex, 10) || 1050;
                            // use setProperty to add !important so it beats the base rule
                            backdrop.style.setProperty('z-index', (z - 1), 'important');
                        }
                    }, 0);
                });
            }
        });

        // always reset backdrop stack whenever any modal closes
        document.addEventListener('hidden.bs.modal', () => {
            setTimeout(() => {
                syncModalBackdrops();
            }, 0);
        });
    });

    // --- API Calls ---
    // loadDashboard optionally accepts a callback that's executed after the state is updated
    function loadDashboard(callback) {
        console.log("1. Starting loadDashboard()...");
        setGlobalLoading(true, "Refreshing dashboard...");
        google.script.run
            .withSuccessHandler(data => {
                console.log("2. SuccessHandler: Data received! Size:", data ? Object.keys(data).length : 0);
                
                if (!data) {
                    showAlert("No data returned from server", "danger");
                    setGlobalLoading(false);
                    return;
                }
                
                appState = {
                    email: data.email || "",
                    role: data.role || "",
                    projects: data.projects || [],
                    actions: data.actions || [],
                    settings: data.settings || { projectTypes: [], phases: [], statuses: [] },
                    metrics: data.metrics || {}
                };

                // Store users globally for assignee dropdown
                window.allUsers = data.users || [];

                console.log("3. Populating Dropdowns...");
                populateDropdowns();

                console.log("4. Rendering Header...");
                renderHeader();

                console.log("5. Rendering Projects...");
                renderProjects();

                console.log("6. Applying RBAC...");
                applyRBAC();

                console.log("7. Dashboard load successfully finished.");
                if (callback && typeof callback === 'function') {
                    callback();
                }
                setGlobalLoading(false);
            })
            .withFailureHandler(err => {
                console.error("Dashboard load failed:", err);
                document.getElementById("projectsGrid").innerHTML = `<div class='col-12 text-center text-danger py-5'>Failed to load data. Please refresh.</div>`;
                showAlert("Error loading dashboard: " + err.message, "danger");
                setGlobalLoading(false);
            })
                .getDashboardData();
    }

    // --- Renderers ---
    function renderHeader() {
        document.getElementById("userInfo").innerHTML = `
      <i class="me-2">👤 ${escapeHtml(appState.email || "")}</i> 
      <span class="badge bg-secondary">${escapeHtml(appState.role || "")}</span>
    `;

        // Enhanced Metrics
        if (appState && appState.metrics) {
            // Core metrics
            document.getElementById("metricActive").textContent = appState.metrics.totalActive || 0;
            document.getElementById("metricAvg").textContent = appState.metrics.averageCompletion || 0;
            document.getElementById("metricBlocked").textContent = appState.metrics.blockedActions || 0;

            // Calculate additional metrics
            const totalProjects = appState.projects.length || 0;
            const completedProjects = appState.projects.filter(p => p.status === "Completed" || p.status === "Closure").length || 0;
            const completionRate = totalProjects > 0 ? Math.round((completedProjects / totalProjects) * 100) : 0;
            
            const totalActions = appState.actions.length || 0;
            const completedActions = appState.actions.filter(a => a.status === "Completed").length || 0;
            const onTimeActions = appState.actions.filter(a => {
                if (a.dueDate) {
                    const dueDate = new Date(a.dueDate);
                    return dueDate >= new Date();
                }
                return true;
            }).length || 0;
            
            const highPriorityActions = appState.actions.filter(a => a.priority === "High" || a.priority === "Critical").length || 0;
            const avgCompletionByPhase = calculatePhaseCompletion();
            
            // Update extended metrics
            document.getElementById("metricTotal").textContent = totalProjects;
            document.getElementById("metricCompleted").textContent = completedProjects;
            document.getElementById("metricCompletionRate").textContent = completionRate;
            document.getElementById("metricActions").textContent = totalActions;
            document.getElementById("metricCompletedActions").textContent = completedActions;
            document.getElementById("metricOnTime").textContent = onTimeActions;
            document.getElementById("metricHighPriority").textContent = highPriorityActions;

            // Status breakdown
            let statusHtml = "";
            for (const [status, count] of Object.entries(appState.metrics.statusCounts || {})) {
                statusHtml += `<div class="d-flex justify-content-between mb-1"><span class="text-muted">${escapeHtml(status)}</span><span class="fw-bold">${count}</span></div>`;
            }
            document.getElementById("metricStatuses").innerHTML = statusHtml || "No projects.";
            
            // Calculate phase completion and health metrics
            calculatePhaseCompletion();
        }
    }

    function calculatePhaseCompletion() {
        const phases = {};
        appState.projects.forEach(p => {
            if (!phases[p.phase]) {
                phases[p.phase] = { total: 0, sum: 0 };
            }
            phases[p.phase].total++;
            phases[p.phase].sum += (p.percentageCompleted || 0);
        });
        
        let html = "";
        for (const [phase, data] of Object.entries(phases)) {
            const avg = Math.round(data.sum / data.total);
            html += `<small class="d-block mb-1"><span class="text-muted">${phase}:</span> <strong>${avg}%</strong></small>`;
        }
        if (document.getElementById("metricPhaseBreakdown")) {
            document.getElementById("metricPhaseBreakdown").innerHTML = html || "No phases.";
        }
        
        // Calculate health score and risk metrics
        const totalProjects = appState.projects.length || 1;
        const onTrackCount = appState.projects.filter(p => (p.percentageCompleted || 0) >= 50).length;
        const atRiskCount = appState.projects.filter(p => (p.percentageCompleted || 0) < 30 && p.status !== "Completed").length;
        const healthScore = Math.round((appState.metrics?.averageCompletion || 0) + (onTrackCount / totalProjects * 20));
        
        document.getElementById("onTrackProjects").textContent = onTrackCount;
        document.getElementById("atRiskProjects").textContent = atRiskCount;
        document.getElementById("healthScore").style.width = Math.min(100, healthScore) + "%";
        
        return html;
    }

    function applyRBAC() {
        // Everyone can create items (backend guards it further if needed)
        document.getElementById("btnNewProject").classList.remove("d-none");
        document.getElementById("btnNewAction").classList.remove("d-none");

        // Show Admin Panel Button
        if (appState.role === "Admin") {
            document.getElementById("btnAdminPanel").classList.remove("d-none");
        }

        // Owner filter only for Managers and Admins
        const ownerContainer = document.getElementById('ownerFilterContainer');
        if (ownerContainer) {
            if (appState.role === 'Admin' || appState.role === 'Manager') {
                ownerContainer.classList.remove('d-none');
            } else {
                ownerContainer.classList.add('d-none');
            }
        }
    }

    function populateDropdowns() {
        if (!appState || !appState.settings) {
            console.warn("appState or settings not available yet");
            return;
        }

        const fill = (id, arr) => {
            const el = document.getElementById(id);
            if (!el) return;
            const currentVal = el.value;
            el.innerHTML = arr.map(v => `<option value="${v}">${v}</option>`).join("");
            if (currentVal && arr.includes(currentVal)) el.value = currentVal;
        };

        fill('pType', appState.settings.projectTypes || []);
        fill('pStatus', appState.settings.statuses || []);
        fill('pPhase', appState.settings.phases || []);
        fill('filterStatus', ["All", ...(appState.settings.statuses || [])]);
        fill('filterPhase', ["All", ...(appState.settings.phases || [])]);
        fill('uStatus', appState.settings.statuses || []);
        fill('editProjectType', appState.settings.projectTypes || []);
        fill('editProjectStatus', appState.settings.statuses || []);
        fill('editProjectPhase', appState.settings.phases || []);
        
        // Populate owner filter if visible
        populateOwnerFilter();

        // Populate assignee dropdown
        populateAssigneeDropdown();
    }

    // Build list of unique project owners for the dashboard filter
    function populateOwnerFilter() {
        const ownerSelect = document.getElementById('filterOwner');
        if (!ownerSelect) return;

        const previous = ownerSelect.value;
        // Assemble unique owner emails from projects the user can see
        const owners = [...new Set(appState.projects.map(p => p.owner).filter(o => o))];
        owners.sort((a, b) => a.localeCompare(b));

        // Try to resolve to friendly names using the global users list
        const options = owners.map(o => {
            const user = (window.allUsers || []).find(u => u.email === o);
            const display = user && user.name ? `${user.name} (${o})` : o;
            return `<option value="${o}">${escapeHtml(display)}</option>`;
        });

        ownerSelect.innerHTML = `<option value="All">All Owners</option>` + options.join('');
        if (previous && owners.includes(previous)) {
            ownerSelect.value = previous;
        } else {
            ownerSelect.value = "All";
        }
    }

    function populateAssigneeDropdown() {
        // Get all users from appState
        let users = [];
        
        // Extract users from metrics or load from backend
        // For now, we'll use a data structure built during dashboard load
        if (window.allUsers && window.allUsers.length > 0) {
            users = window.allUsers;
        }

        const dropdownList = document.getElementById("aAssigneeDropdownList");
        if (!dropdownList) return;

        dropdownList.innerHTML = users.map(user => `
            <a class="dropdown-item" href="#" onclick="selectAssignee('${escapeHtml(user.email)}', '${escapeHtml(user.name || user.email)}'); return false;">
                <strong>${escapeHtml(user.name || user.email)}</strong>
                <br><small class="text-muted">${escapeHtml(user.email)}</small>
            </a>
        `).join("");

        // Setup search and toggle
        const searchInput = document.getElementById("aAssigneeSearch");
        if (searchInput) {
            searchInput.addEventListener("input", filterAssignees);
        }

        const toggleBtn = document.getElementById("aAssigneeDropdown");
        if (toggleBtn) {
            toggleBtn.addEventListener("click", () => {
                const list = document.getElementById("aAssigneeDropdownList");
                list.style.display = list.style.display === "none" ? "block" : "none";
            });
        }

        // Close dropdown when clicking outside
        document.addEventListener("click", (e) => {
            const list = document.getElementById("aAssigneeDropdownList");
            const search = document.getElementById("aAssigneeSearch");
            const toggle = document.getElementById("aAssigneeDropdown");
            if (list && search && toggle && !search.contains(e.target) && !toggle.contains(e.target)) {
                list.style.display = "none";
            }
        });
    }

    function filterAssignees() {
        const searchTerm = document.getElementById("aAssigneeSearch").value.toLowerCase();
        const items = document.getElementById("aAssigneeDropdownList").querySelectorAll(".dropdown-item");
        
        items.forEach(item => {
            const text = item.textContent.toLowerCase();
            item.style.display = text.includes(searchTerm) ? "block" : "none";
        });
    }

    function selectAssignee(email, name) {
        document.getElementById("aAssignee").value = email;
        document.getElementById("aAssigneeSearch").value = name;
        document.getElementById("aAssigneeSelected").textContent = name;
        document.getElementById("aAssigneeDropdownList").style.display = "none";
    }

    function renderProjects() {
        console.log(" -> renderProjects: Initialization.");
        const grid = document.getElementById("projectsGrid");
        const select = document.getElementById("aProjectSelect");

        grid.innerHTML = "";
        select.innerHTML = '<option value="">Select Project...</option>';

        console.log(" -> renderProjects: Filtering appState projects.");
        const filteredProjects = appState.projects.filter(passesFilters);
        console.log(" -> renderProjects: " + filteredProjects.length + " projects passed the filter.");

        if (filteredProjects.length === 0) {
            grid.innerHTML = "<div class='col-12 text-center text-muted py-5'>No matching projects.</div>";
            return;
        }

        // Populate dropdown
        filteredProjects.forEach(p => {
            select.innerHTML += `<option value="${p.id}">${escapeHtml(p.name)} (${p.id})</option>`;
        });

        // Refresh assigned-to display after populating projects
        updateAssignedTo();

        // Always render grouped list view
        renderProjectsList(filteredProjects, grid);
    }

    function renderProjectsList(projects, grid) {
        // Group by status
        const groups = {};
        projects.forEach(p => {
            if (!groups[p.status]) groups[p.status] = [];
            groups[p.status].push(p);
        });

        let html = "";
        // Use dynamic status list from settings, fall back to hardcoded if not available
        const statusOrder = (appState.settings && appState.settings.statuses) ? appState.settings.statuses : ["Not Started", "Pending", "In Progress", "On Hold", "Completed", "Cancelled", "Closure"];
        let groupCounter = 0;
        
        statusOrder.forEach(status => {
            if (!groups[status]) return;
            
            const statusColor = getStatusColor(status);
            const groupId = `group-${groupCounter++}`;
            
            html += `
                <div class="col-12 mb-3">
                    <div class="card border-${statusColor} border-start border-5 shadow-sm">
                        <div class="card-header bg-light border-0 p-3" role="button" data-bs-toggle="collapse" data-bs-target="#${groupId}" style="cursor: pointer;">
                            <h6 class="mb-0 fw-bold text-${statusColor}">
                                <span class="badge bg-${statusColor} me-2">${groups[status].length}</span>${status}
                            </h6>
                        </div>
                        <div class="collapse show" id="${groupId}">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead class="table-light">
                                        <tr>
                                            <th style="width: 30%;">Project</th>
                                            <th style="width: 15%;">Phase</th>
                                            <th style="width: 15%;">Progress</th>
                                            <th style="width: 20%;">Owner / Manager</th>
                                            <th style="width: 20%;">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
            `;

            groups[status].forEach(p => {
                const progressWidth = Math.min(100, p.percentageCompleted || 0);
                html += `
                    <tr class="align-middle">
                        <td>
                            <div class="fw-bold">${escapeHtml(p.name)}</div>
                            <small class="text-muted">${escapeHtml(p.id)}</small>
                        </td>
                        <td><small>${p.phase}</small></td>
                        <td>
                            <div class="progress" style="height: 18px;">
                                <div class="progress-bar bg-${getProgressBarColor(p.percentageCompleted || 0)}" style="width: ${progressWidth}%">${p.percentageCompleted || 0}%</div>
                            </div>
                        </td>
                        <td><small>${escapeHtml(p.owner.substring(0, 25))}</small><br><small class="text-muted">${escapeHtml(p.manager || '')}</small></td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary" onclick="expandProjectDetail('${escapeHtml(p.id)}')" title="View Project Details">📋 View Details</button>
                        </td>
                    </tr>
                `;
            });

            html += `
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });

        grid.innerHTML = html;
    }

    // Set the Assigned To display in the Action modal to the selected project's owner
    function updateAssignedTo() {
        const select = document.getElementById('aProjectSelect');
        const assignedDisplay = document.getElementById('aAssignedTo');
        const assignedEmail = document.getElementById('aAssignedToEmail');
        if (!select || !assignedDisplay || !assignedEmail) return;

        const projId = select.value;
        if (!projId) {
            assignedDisplay.textContent = 'Not selected';
            assignedEmail.value = '';
            return;
        }

        const proj = appState.projects.find(p => p.id === projId);
        if (!proj) {
            assignedDisplay.textContent = 'Project owner not found';
            assignedEmail.value = '';
            const phaseEl = document.getElementById('aProjectPhase');
            if (phaseEl) phaseEl.textContent = '-';
            return;
        }

        assignedDisplay.textContent = proj.owner || 'No owner';
        assignedEmail.value = proj.owner || '';
        const phaseEl = document.getElementById('aProjectPhase');
        if (phaseEl) phaseEl.textContent = proj.phase || '-';
    }

    function renderProjectsGrouped(projects, grid) {
        // Group by status
        const groups = {};
        projects.forEach(p => {
            if (!groups[p.status]) groups[p.status] = [];
            groups[p.status].push(p);
        });

        let html = "";
        const statusOrder = ["Not Started", "Pending", "In Progress", "On Hold", "Completed", "Closure"];
        
        statusOrder.forEach(status => {
            if (!groups[status]) return;
            
            const statusColor = getStatusColor(status);
            html += `
                <div class="col-12 mb-4">
                    <div class="card border-${statusColor} border-start border-5 shadow-sm">
                        <div class="card-header bg-light border-0">
                            <h6 class="mb-0 fw-bold text-${statusColor}">
                                <span class="badge bg-${statusColor} me-2">${groups[status].length}</span>${status}
                            </h6>
                        </div>
                        <div class="card-body">
                            <div class="row">
            `;

            groups[status].forEach(p => {
                const progressWidth = Math.min(100, p.percentageCompleted || 0);
                html += `
                    <div class="col-md-6 col-lg-4 mb-3">
                        <div class="card h-100 project-card border-0 shadow-sm">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <h6 class="card-title fw-bold flex-grow-1">${escapeHtml(p.name)}</h6>
                                    <span class="badge bg-${statusColor} text-white">${p.percentageCompleted || 0}%</span>
                                </div>
                                <small class="text-muted d-block mb-2">${escapeHtml(p.id)} • ${p.projectType}</small>
                                
                                <div class="progress mb-3" style="height: 6px;">
                                    <div class="progress-bar bg-${getProgressBarColor(p.percentageCompleted || 0)}" style="width: ${progressWidth}%"></div>
                                </div>

                                <div class="row small mb-3 gx-1">
                                    <div class="col-6"><span class="text-muted">Phase:</span><br><strong>${p.phase}</strong></div>
                                    <div class="col-6"><span class="text-muted">Owner:</span><br><strong>${escapeHtml(p.owner).substring(0, 20)}</strong><br><small class="text-muted">Mgr: ${escapeHtml(p.manager || 'N/A')}</small></div>
                                </div>

                                <small class="text-muted d-block mb-2">Due: ${p.deadline || "N/A"}</small>

                                <div class="btn-group d-grid gap-1 d-flex" role="group">
                                    <button class="btn btn-sm btn-outline-primary" onclick="expandProjectDetail('${escapeHtml(p.id)}')">Details</button>
                                    <button class="btn btn-sm btn-outline-warning" onclick="openEditProjectModal('${escapeHtml(p.id)}')">Edit</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });

        grid.innerHTML = html;
    }

    function expandProjectDetail(projectId) {
        appState.currentProjectId = projectId;  // Track current project
        const project = appState.projects.find(p => p.id === projectId);
        if (!project) return;

        const modal = new bootstrap.Modal(document.getElementById("projectDetailModal") || createProjectDetailModal());
        document.getElementById("projectDetailTitle").textContent = escapeHtml(project.name);
        
        const detailBody = document.getElementById("projectDetailBody");
        const progressWidth = Math.min(100, project.percentageCompleted || 0);

        detailBody.innerHTML = `
            <div class="row mb-3">
                <div class="col-md-6">
                    <h6 class="text-muted">Status</h6>
                    <p class="fw-bold"><span class="badge bg-${getStatusColor(project.status)}">${project.status}</span></p>
                </div>
                <div class="col-md-6">
                    <h6 class="text-muted">Progress</h6>
                    <div class="progress" style="height: 25px;">
                        <div class="progress-bar bg-${getProgressBarColor(project.percentageCompleted || 0)}" style="width: ${progressWidth}%">${project.percentageCompleted || 0}%</div>
                    </div>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <h6 class="text-muted">Phase</h6>
                    <p class="fw-bold">${project.phase}</p>
                </div>
                <div class="col-md-6">
                    <h6 class="text-muted">Timeline</h6>
                    <p class="fw-bold">${project.startDate} to ${project.deadline}</p>
                </div>
            </div>

            <hr>

            <div class="mb-3">
                <h6 class="text-muted">Latest Update</h6>
                <p class="small mb-1"><span class="text-muted">${escapeHtml(project.lastUpdatedDate)}</span></p>
                <div class="alert alert-light border mb-0"><small>${escapeHtml(getLatestProjectUpdate(project) || "No updates yet.")}</small></div>
            </div>

            <hr>

            <div class="mb-3">
                <h6 class="text-muted">Business Outcomes</h6>
                <p class="small">${escapeHtml(project.outcomes || "N/A")}</p>
            </div>

            <div class="mb-3">
                <h6 class="text-muted">Key Risks</h6>
                <p class="small">${escapeHtml(project.risks || "N/A")}</p>
            </div>

            <hr>

            <div class="row mb-3">
                <div class="col-md-6">
                    <h6 class="text-muted">Project Owner</h6>
                    <p class="small fw-bold">${escapeHtml(project.owner)}</p>
                </div>
                <div class="col-md-6">
                    <h6 class="text-muted">Project Manager</h6>
                    <p class="small fw-bold">${escapeHtml(project.manager || "N/A")}</p>
                </div>
            </div>

            <hr>

            <h6 class="text-muted mb-2">Linked Actions</h6>
            ${renderProjectActions(projectId)}

    // --- Filter Handlers ---
    function passesFilters(item) {
        const statusFilter = document.getElementById("filterStatus").value;
        const phaseFilter = document.getElementById("filterPhase").value;
        const ownerFilterEl = document.getElementById("filterOwner");
        const ownerFilter = ownerFilterEl ? ownerFilterEl.value : "All";
        const dateFrom = document.getElementById("filterDateFrom").value;
        const dateTo = document.getElementById("filterDateTo").value;

        // 1. Status Filter
        if (statusFilter !== "All" && item.status !== statusFilter) return false;

        // 1.b Phase Filter
        if (phaseFilter !== "All" && item.phase !== phaseFilter) return false;

        // 1c. Owner Filter (only applies if user selected one)
        if (ownerFilter && ownerFilter !== "All" && item.owner !== ownerFilter) return false;

        // 2. Date Filter
        if (dateFrom || dateTo) {
            const itemDate = new Date(item.lastUpdatedDate).getTime();
            if (dateFrom && itemDate < new Date(dateFrom).setHours(0, 0, 0, 0)) return false;
            if (dateTo && itemDate > new Date(dateTo).setHours(23, 59, 59, 999)) return false;
        }

        return true;
    }

    // --- Utils ---
    function getStatusColor(status) {
        // 5-color scheme for status grouping
        if (status === "Completed" || status === "Closure") return "success"; // green
        if (status === "On Hold" || status === "Cancelled") return "danger"; // red
        if (status === "In Progress") return "info"; // blue
        if (status === "Pending") return "warning"; // yellow
        return "secondary"; // purple/grey fallback
    }

    function getStatusBadge(status) {
        if (status === "Completed" || status === "Closure") return "badge bg-success";
        if (status === "On Hold" || status === "Cancelled") return "badge bg-danger";
        if (status === "In Progress") return "badge bg-info text-dark";
        if (status === "Pending") return "badge bg-warning text-dark";
        return "badge bg-secondary";
    }

    function getProgressBarColor(percentage) {
        // Color bar based on completion percentage
        if (percentage >= 66) return "success"; // green: 66-100%
        if (percentage >= 33) return "warning"; // yellow: 33-65%
        return "danger"; // red: 0-32%
    }

                       <div class="d-flex justify-content-between align-items-center mb-1">
                          <small class="fw-bold text-dark">${log.user}</small>
                          <div>
                            <small class="text-muted"><i class="far fa-clock"></i> ${date}</small>
                            ${canEdit ? `<button class="btn btn-sm btn-link text-warning p-0 ms-2" title="Edit note" onclick="openEditNoteModal('${projectId}','${log.timestamp}',\`${escapeHtml(log.text).replace(/`/g, '\\`')}\`)">✏️</button>` : ''}
                            ${canDelete ? `<button class="btn btn-sm btn-link text-danger p-0 ms-2" title="Delete note" onclick="confirmDeleteNote('${projectId}','${log.timestamp}')">&times;</button>` : ''}
                          </div>
                       </div>
                       <p class="mb-0 small">${log.text} ${statusBadge}</p>
                    </div>
                  </div>
                `;
            });
        }
        
        // Update history modal title
        const modal = document.getElementById("historyModal");
        const title = modal.querySelector(".modal-title");
        title.textContent = `${project.name} - Notes & History`;
        
        new bootstrap.Modal(modal).show();
    }

    function openEditNoteModal(projectId, noteTimestamp, currentText) {
        // Store data in a temporary global for the submit handler
        window.editNoteData = { projectId, noteTimestamp };
        
        // Create or get the edit note modal
        let editModal = document.getElementById('editNoteModal');
        if (!editModal) {
            editModal = document.createElement('div');
            editModal.id = 'editNoteModal';
            editModal.className = 'modal fade';
            editModal.innerHTML = `
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header bg-warning">
                            <h5 class="modal-title">✏️ Edit Note</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <form id="editNoteForm" onsubmit="handleEditNoteSubmit(event)">
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label for="editNoteText" class="form-label">Note Text</label>
                                    <textarea class="form-control" id="editNoteText" rows="4" required></textarea>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                <button type="submit" class="btn btn-warning">Save Changes</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
            document.body.appendChild(editModal);
        }
        
        // Pre-fill the textarea
        document.getElementById('editNoteText').value = currentText;
        
        // Show the modal with proper z-index management
        const modal = new bootstrap.Modal(editModal);
        modal.show();
        
        // Force z-index after Bootstrap renders the modal
        setTimeout(() => {
            editModal.style.setProperty('z-index', '9999', 'important');
            const backdrop = document.querySelector('.modal-backdrop');
            if (backdrop) {
                backdrop.style.setProperty('z-index', '9998', 'important');
            }
        }, 50);
    }

    function handleEditNoteSubmit(e) {
        e.preventDefault();
        
        const { projectId, noteTimestamp } = window.editNoteData;
        const newText = document.getElementById('editNoteText').value.trim();
        
        if (!newText) {
            showAlert('Note text cannot be empty', 'warning');
            return;
        }
        
        // Close the edit modal
        const editModal = bootstrap.Modal.getInstance(document.getElementById('editNoteModal'));
        if (editModal) editModal.hide();
        
        // Show loading
        showAlert('Updating note...', 'info');
        
        // Call backend
        google.script.run
            .withSuccessHandler(function(result) {
                // Close all open modals first
                const allModals = document.querySelectorAll('.modal.show');
                allModals.forEach(modal => {
                    const instance = bootstrap.Modal.getInstance(modal);
                    if (instance) instance.hide();
                });
                
                showAlert(result || 'Note updated successfully!', 'success');
                // Reload dashboard to get updated data
                loadDashboard();
            })
            .withFailureHandler(function(error) {
                showAlert('Error updating note: ' + error.message, 'danger');
            })
            .editProjectComment(projectId, noteTimestamp, newText);
    }

    // rebuild the history/notes panel when the modal is already visible
    function refreshHistoryContent(projectId) {
        const project = appState.projects.find(p => p.id === projectId);
        if (!project) return;
        const container = document.getElementById("historyTimeline");
        if (!container) return;
        container.innerHTML = "";
        const historyArray = project.updates || [];
        if (historyArray.length === 0) {
            container.innerHTML = "<div class='text-muted text-center py-4'>No notes yet. Add one below!</div>";
        } else {
            [...historyArray].reverse().forEach(log => {
                const date = new Date(log.timestamp).toLocaleString();
                const statusBadge = log.status ? `<span class="badge bg-secondary ms-1">${log.status}</span>` : "";
                const canEdit = appState.role === 'Admin';
                const canDelete = appState.role === 'Admin';
                
                container.innerHTML += `
                  <div class="card mb-3 shadow-sm border-start border-primary border-4 rounded-0">
                    <div class="card-body py-2">
                       <div class="d-flex justify-content-between align-items-center mb-1">
                          <small class="fw-bold text-dark">${log.user}</small>
                          <div>
                            <small class="text-muted"><i class="far fa-clock"></i> ${date}</small>
                            ${canEdit ? `<button class="btn btn-sm btn-link text-warning p-0 ms-2" title="Edit note" onclick="openEditNoteModal('${projectId}','${log.timestamp}',\`${escapeHtml(log.text).replace(/`/g, '\\`')}\`)">✏️</button>` : ''}
                            ${canDelete ? `<button class="btn btn-sm btn-link text-danger p-0 ms-2" title="Delete note" onclick="confirmDeleteNote('${projectId}','${log.timestamp}')">&times;</button>` : ''}
                          </div>
                       </div>
                       <p class="mb-0 small">${log.text} ${statusBadge}</p>
                    </div>
                  </div>
                `;
            });
        }
        // update title if present
        const modal = document.getElementById("historyModal");
        if (modal) {
            const titleEl = modal.querySelector(".modal-title");
            if (titleEl) titleEl.textContent = `${project.name} - Notes & History`;
        }
    }

    function toggleMetrics() {
        const metricsDiv = document.getElementById("rollupMetrics");
        const btn = document.getElementById("metricsToggleBtn");
        const icon = document.getElementById("metricsToggleIcon");
        // update icon and label text
        const label = btn.querySelector('.btn-label');
        if (metricsDiv.classList.contains("collapsed")) {
            // expand
            metricsDiv.classList.remove("collapsed");
            icon.textContent = "▼";
            if (label) label.textContent = " Collapse";
        } else {
            // collapse
            metricsDiv.classList.add("collapsed");
            icon.textContent = "▶";
            if (label) label.textContent = " Expand";
        }
    }

    function getLatestProjectUpdate(project) {
        // Try to get the latest comment/update first
        if (project.updates && project.updates.length > 0) {
            const latest = project.updates[project.updates.length - 1];
            return latest.text || project.lastUpdatedText || "No updates yet.";
        }
        return project.lastUpdatedText || "No updates yet.";
    }

    // ---------- Admin deletion helpers ----------
    function confirmDeleteProject() {
        if (!confirm("Are you sure you want to permanently delete this project and all its actions?")) return;
        const pid = appState.currentProjectId;
        setGlobalLoading(true, "Deleting project...");
        google.script.run
            .withSuccessHandler(res => {
                showAlert(res, "success");
                loadDashboard();
                // close any open project modals
                bootstrap.Modal.getOrCreateInstance(document.getElementById('projectDetailModal')).hide();
                bootstrap.Modal.getOrCreateInstance(document.getElementById('editProjectModal')).hide();
            })
            .withFailureHandler(err => {
                showAlert(err.message, "danger");
                setGlobalLoading(false);
            })
            .deleteProject(pid);
    }

    function confirmDeleteAction(actionId) {
        if (!confirm("Delete this action? It cannot be recovered.")) return;
        setGlobalLoading(true, "Deleting action...");
        google.script.run
            .withSuccessHandler(res => { 
                showAlert(res, "success"); 
                loadDashboard(); 
                bootstrap.Modal.getOrCreateInstance(document.getElementById('projectDetailModal')).hide();
            })
            .withFailureHandler(err => {
                showAlert(err.message, "danger");
                setGlobalLoading(false);
            })
            .deleteAction(actionId);
    }

    function confirmDeleteNote(projectId, timestamp) {
        if (!confirm("Remove this note from the project history?")) return;
        setGlobalLoading(true, "Deleting note...");
        google.script.run
            .withSuccessHandler(res => {
                showAlert(res, "success");
                // reload state then update the history panel
                loadDashboard(() => refreshHistoryContent(projectId));
            })
            .withFailureHandler(err => {
                showAlert(err.message, "danger");
                setGlobalLoading(false);
            })
            .deleteProjectComment(projectId, timestamp);
    }

    function showAlert(message, type) {
        const container = document.getElementById("alertContainer");
        container.innerHTML = `
      <div class="alert alert-${type} alert-dismissible fade show shadow-sm" role="alert">
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    `;
        setTimeout(() => { container.innerHTML = ""; }, 5000);
    }

    // ==============================================
    // ADMIN PANEL LOGIC (PHASE 3)
    // ==============================================

    function toggleAdminPanel() {
        const isHidden = document.getElementById("adminPanel").classList.contains("d-none");
        const dashGrid = document.querySelector("#projectsGrid").closest(".card"); // get the project grid container card

        if (isHidden) {
            document.getElementById("adminPanel").classList.remove("d-none");
            dashGrid.classList.add("d-none");
            document.getElementById("mainActions").classList.add("d-none");
            document.getElementById("mainHeading").innerText = "Admin Console";
            document.getElementById("btnAdminPanel").innerText = "Exit Admin";
            document.getElementById("btnAdminPanel").classList.replace("btn-outline-light", "btn-warning");
            loadAdminData();
        } else {
            document.getElementById("adminPanel").classList.add("d-none");
            dashGrid.classList.remove("d-none");
            document.getElementById("mainActions").classList.remove("d-none");
            document.getElementById("mainHeading").innerText = "Dashboard";
            document.getElementById("btnAdminPanel").innerText = "Admin Panel";
            document.getElementById("btnAdminPanel").classList.replace("btn-warning", "btn-outline-light");
            loadDashboard(); // Refresh state from any settings changes
        }
    }

    function loadAdminData() {
        document.getElementById("adminUsersTableBody").innerHTML = "<tr><td colspan='5' class='text-center'>Loading...</td></tr>";
        google.script.run
            .withSuccessHandler(renderAdminData)
            .withFailureHandler(err => showAlert(err.message, "danger"))
            .getAdminData();
    }

    function renderAdminData(data) {
        // Render Users
        const uBody = document.getElementById("adminUsersTableBody");
        uBody.innerHTML = "";
        data.users.forEach(u => {
            uBody.innerHTML += `
               <tr>
                 <td>${escapeHtml(u.email)}</td>
                 <td>${escapeHtml(u.name)}</td>
                 <td><span class="badge bg-secondary">${escapeHtml(u.role)}</span></td>
                 <td>${escapeHtml(u.manager || "-")}</td>
                 <td>${u.emailEnabled ? '<span class="text-success fw-bold">✓ Yes</span>' : '<span class="text-muted">✗ No</span>'}</td>
                 <td><button class="btn btn-sm btn-outline-danger py-0 btn-delete-user" data-email="${escapeHtml(u.email)}">Drop</button></td>
               </tr>
            `;
        });

        // Render Settings Grouped
        const sGrid = document.getElementById("adminSettingsGrid");
        sGrid.innerHTML = "";

        const groupedSettings = data.settingsList.reduce((acc, curr) => {
            if (!acc[curr.key]) acc[curr.key] = [];
            acc[curr.key].push(curr.value);
            return acc;
        }, {});

        for (const [key, values] of Object.entries(groupedSettings)) {
            let rowHtml = "";
            values.forEach(v => {
                // FIXED: Use data attributes instead of onclick to prevent XSS
                rowHtml += `
                 <li class="list-group-item d-flex justify-content-between align-items-center py-1">
                   <small>${escapeHtml(v)}</small>
                   <button class="btn btn-sm btn-link text-danger p-0 btn-delete-setting" data-key="${escapeHtml(key)}" data-value="${escapeHtml(v)}">&times;</button>
                 </li>
                `;
            });

            sGrid.innerHTML += `
              <div class="col-md-4 mb-3">
                 <div class="card h-100">
                    <div class="card-header fw-bold bg-light py-2">${escapeHtml(key)}</div>
                    <ul class="list-group list-group-flush">${rowHtml}</ul>
                 </div>
              </div>
            `;
        }

        // FIXED: Add event listeners instead of onclick handlers
        document.querySelectorAll('.btn-delete-setting').forEach(btn => {
            btn.addEventListener('click', function() {
                const key = this.getAttribute('data-key');
                const val = this.getAttribute('data-value');
                if (!confirm(`Remove '${val}' from ${key}?`)) return;
                google.script.run
                    .withSuccessHandler(res => { showAlert(res, "success"); loadAdminData(); })
                    .withFailureHandler(err => showAlert(err.message, "danger"))
                    .deleteSetting(key, val);
            });
        });

        document.querySelectorAll('.btn-delete-user').forEach(btn => {
            btn.addEventListener('click', function() {
                const email = this.getAttribute('data-email');
                if (!confirm(`Are you sure you want to remove ${email}?`)) return;
                google.script.run
                    .withSuccessHandler(res => { showAlert(res, "success"); loadAdminData(); })
                    .withFailureHandler(err => showAlert(err.message, "danger"))
                    .deleteUser(email);
            });
        });
    }

    // --- Admin Mutations ---

    function handleSaveUser(e) {
        e.preventDefault();
        const btn = document.getElementById("btnSaveUser");
        btn.disabled = true;

        const email = document.getElementById("auEmail").value;
        const name = document.getElementById("auName").value;
        const role = document.getElementById("auRole").value;
        const manager = document.getElementById("auManager").value;
        const emailEnabled = document.getElementById("auEmailEnabled").checked;

        google.script.run
            .withSuccessHandler(res => {
                showAlert(res, "success");
                document.getElementById("addUserForm").reset();
                loadAdminData();
                btn.disabled = false;
            })
            .withFailureHandler(err => {
                showAlert(err.message, "danger");
                btn.disabled = false;
            })
            .saveUser(email, name, role, manager, emailEnabled);
    }

    function deleteUser(email) {
        if (!confirm(`Are you sure you want to remove ${email}?`)) return;
        google.script.run
            .withSuccessHandler(res => { showAlert(res, "success"); loadAdminData(); })
            .withFailureHandler(err => showAlert(err.message, "danger"))
            .deleteUser(email);
    }

    function handleSaveSetting(e) {
        e.preventDefault();
        const btn = document.getElementById("btnSaveSetting");
        btn.disabled = true;

        const key = document.getElementById("asKey").value;
        const val = document.getElementById("asVal").value;

        google.script.run
            .withSuccessHandler(res => {
                showAlert(res, "success");
                document.getElementById("asVal").value = "";
                loadAdminData();
                btn.disabled = false;
            })
            .withFailureHandler(err => {
                showAlert(err.message, "danger");
                btn.disabled = false;
            })
            .saveSetting(key, val);
    }

    function deleteSetting(key, val) {
        if (!confirm(`Remove '${val}' from ${key}?`)) return;
        google.script.run
            .withSuccessHandler(res => { showAlert(res, "success"); loadAdminData(); })
            .withFailureHandler(err => showAlert(err.message, "danger"))
            .deleteSetting(key, val);
    }
</script>
